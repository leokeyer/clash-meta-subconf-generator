<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash Meta 多订阅配置生成器</title>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<style>
  :root {
    --bg: #f8fafc; --surface: #fff; --border: #e2e8f0;
    --text: #1e293b; --text-secondary: #64748b;
    --primary: #6366f1; --primary-hover: #4f46e5;
    --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
    --radius: 10px; --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
  }
  .container { max-width: 800px; margin: 0 auto; padding: 24px 20px 60px; }

  .header { text-align: center; padding: 36px 0 28px; }
  .header h1 { font-size: 1.75rem; font-weight: 700; }
  .header p { color: var(--text-secondary); margin-top: 6px; font-size: .925rem; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px;
  }
  .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .card h2 .num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--primary); color: #fff; font-size: .8rem; font-weight: 700;
  }

  label { display: block; font-size: .85rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }
  textarea, input[type="text"] {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
    font-size: .85rem; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg); color: var(--text); transition: border-color .15s; resize: vertical;
  }
  textarea:focus, input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border: none; border-radius: 8px;
    font-size: .875rem; font-weight: 500; cursor: pointer; transition: all .15s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: var(--bg); }
  .btn-sm { padding: 6px 12px; font-size: .8rem; }

  .toast {
    display: inline-block; padding: 8px 14px; border-radius: 8px; font-size: .825rem; font-weight: 500;
    animation: fadeIn .25s ease; margin-top: 8px;
  }
  .toast-success { background: #ecfdf5; color: #065f46; }
  .toast-info { background: #eff6ff; color: #1e40af; }
  .toast-warning { background: #fffbeb; color: #92400e; }
  .toast-error { background: #fef2f2; color: #991b1b; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  .sub-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
  .sub-row input.sub-name { width: 100px; flex-shrink: 0; padding: 8px 10px; font-size: .8rem; font-family: inherit; }
  .sub-row input.sub-url { flex: 1; min-width: 0; padding: 8px 10px; font-size: .8rem; }
  .sub-row .btn-remove {
    flex-shrink: 0; width: 30px; height: 30px; padding: 0;
    border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--text-secondary);
    font-size: 1rem; cursor: pointer; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .sub-row .btn-remove:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

  .result-box {
    background: #f0fdf4; border: 1px solid #86efac; border-radius: var(--radius);
    padding: 20px;
  }
  .result-box label { color: #166534; }
  .result-box .link-row { display: flex; gap: 8px; margin-top: 6px; }
  .result-box input {
    flex: 1; font-family: monospace; font-size: .8rem;
    padding: 10px 14px; border: 1px solid #86efac; border-radius: 8px; background: #fff;
  }
  .result-box .hint { font-size: .75rem; color: var(--text-secondary); margin-top: 8px; }
  .result-box .hint code { background: #e2e8f0; padding: 1px 5px; border-radius: 3px; font-size: .72rem; }

  @media (max-width: 640px) {
    .header h1 { font-size: 1.4rem; }
    .sub-row { flex-wrap: wrap; }
    .sub-row input.sub-name { width: 100%; }
    .result-box .link-row { flex-direction: column; }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Clash Meta 多订阅配置生成器</h1>
    <p>添加多个订阅链接 → 一键生成配置和订阅链接</p>
  </div>

  <!-- ===== 第一步：订阅链接 ===== -->
  <div class="card">
    <h2><span class="num">1</span> 订阅链接</h2>
    <div id="subList"></div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button class="btn btn-outline btn-sm" id="btnAddSub">+ 添加订阅</button>
    </div>
  </div>

  <!-- ===== 第二步：生成 ===== -->
  <div class="card" style="text-align:center;">
    <button class="btn btn-primary" id="btnGenerate" style="font-size:1rem;padding:12px 36px;">生成配置和订阅链接</button>
    <div id="genStatus"></div>
  </div>

  <!-- ===== 结果 ===== -->
  <div class="result-box" id="resultArea" style="display:none;">
    <label>订阅链接（将此 URL 填入 Clash 客户端订阅地址即可直接导入完整配置）</label>
    <div class="link-row">
      <input type="text" id="subLinkInput" readonly>
      <button class="btn btn-primary btn-sm" id="btnCopyLink" style="flex-shrink:0;">复制链接</button>
    </div>
    <p class="hint">
      监听器类型 <code>mixed</code>，端口 <code>8000</code> 起递增，地址 <code>127.0.0.1</code>。DNS 仅开启不启用 fake-ip，使用系统 DNS。
      部署到 Vercel 后链接可用。
    </p>
  </div>
</div>

<script>
// ======================== 协议解析 ========================

function parseVmess(uri) {
  try {
    var b64 = uri.replace('vmess://', '');
    var json = JSON.parse(atob(b64));
    var p = { name: json.ps || 'VMess 节点', type: 'vmess', server: json.add, port: parseInt(json.port) || 443, uuid: json.id, alterId: parseInt(json.aid) || 0, cipher: json.scy || 'auto', udp: true };
    if (json.net) p.network = json.net;
    if (json.net === 'ws') { p['ws-opts'] = { path: json.path || '/', headers: {} }; if (json.host) p['ws-opts'].headers.Host = json.host; }
    else if (json.net === 'grpc') { p['grpc-opts'] = { 'grpc-service-name': json.path || '' }; }
    else if (json.net === 'h2') { p['h2-opts'] = { host: [json.host] || [], path: json.path || '' }; }
    if (json.tls === 'tls') {
      p.tls = true;
      if (json.sni) p.servername = json.sni;
      if (json.alpn) p.alpn = json.alpn.split(',').map(function(s) { return s.trim(); });
      if (json.fp) p['client-fingerprint'] = json.fp;
    }
    return p;
  } catch (e) { return null; }
}

function parseVless(uri) {
  try {
    var url = new URL(uri);
    var p = { name: decodeURIComponent(url.hash ? url.hash.slice(1) : 'VLESS 节点'), type: 'vless', server: url.hostname, port: parseInt(url.port) || 443, uuid: url.username, udp: true };
    var params = url.searchParams;
    p.cipher = params.get('encryption') || 'none';
    p.network = params.get('type') || 'tcp';
    if (p.network === 'ws') { p['ws-opts'] = { path: params.get('path') || '/', headers: {} }; if (params.get('host')) p['ws-opts'].headers.Host = params.get('host'); }
    else if (p.network === 'grpc') { p['grpc-opts'] = { 'grpc-service-name': params.get('serviceName') || '' }; }
    var sec = params.get('security') || 'none';
    if (sec === 'reality') {
      p.tls = true;
      p['reality-opts'] = { 'public-key': params.get('pbk') || '', 'short-id': params.get('sid') || '' };
      if (params.get('spx')) p['reality-opts']['spider-x'] = params.get('spx');
      if (params.get('sni')) p.servername = params.get('sni');
      if (params.get('fp')) p['client-fingerprint'] = params.get('fp');
      if (params.get('flow')) p.flow = params.get('flow');
    } else if (sec === 'tls') {
      p.tls = true;
      if (params.get('sni')) p.servername = params.get('sni');
      if (params.get('fp')) p['client-fingerprint'] = params.get('fp');
      if (params.get('alpn')) p.alpn = params.get('alpn').split(',').map(function(s) { return s.trim(); });
      if (params.get('flow')) p.flow = params.get('flow');
    }
    return p;
  } catch (e) { return null; }
}

function parseTrojan(uri) {
  try {
    var url = new URL(uri);
    var p = { name: decodeURIComponent(url.hash ? url.hash.slice(1) : 'Trojan 节点'), type: 'trojan', server: url.hostname, port: parseInt(url.port) || 443, password: url.username, udp: true };
    var params = url.searchParams;
    p.network = params.get('type') || 'tcp';
    if (p.network === 'ws') { p['ws-opts'] = { path: params.get('path') || '/', headers: {} }; if (params.get('host')) p['ws-opts'].headers.Host = params.get('host'); }
    else if (p.network === 'grpc') { p['grpc-opts'] = { 'grpc-service-name': params.get('serviceName') || '' }; }
    if ((params.get('security') || 'tls') === 'tls') {
      p.tls = true;
      if (params.get('sni')) p.servername = params.get('sni');
      if (params.get('fp')) p['client-fingerprint'] = params.get('fp');
      if (params.get('alpn')) p.alpn = params.get('alpn').split(',').map(function(s) { return s.trim(); });
    }
    return p;
  } catch (e) { return null; }
}

function parseSS(uri) {
  try {
    var withoutHash = uri.split('#')[0];
    var name = uri.includes('#') ? decodeURIComponent(uri.split('#')[1]) : 'SS 节点';
    var rest = withoutHash.replace('ss://', '');
    var method, password, server, port;
    if (rest.includes('@')) {
      var parts = rest.split('@'), d = atob(parts[0]), ci = d.indexOf(':');
      method = d.slice(0, ci); password = d.slice(ci + 1);
      var lc = parts[1].lastIndexOf(':');
      server = parts[1].slice(0, lc);
      if (server.startsWith('[') && server.endsWith(']')) server = server.slice(1, -1);
      port = parseInt(parts[1].slice(lc + 1)) || 8388;
    } else {
      var d = atob(rest), credAddr = d.split('@'), ci = credAddr[0].indexOf(':');
      method = credAddr[0].slice(0, ci); password = credAddr[0].slice(ci + 1);
      var lc = credAddr[1].lastIndexOf(':');
      server = credAddr[1].slice(0, lc);
      if (server.startsWith('[') && server.endsWith(']')) server = server.slice(1, -1);
      port = parseInt(credAddr[1].slice(lc + 1)) || 8388;
    }
    return { name: name, type: 'ss', server: server, port: port, cipher: method, password: password, udp: true };
  } catch (e) { return null; }
}

function parseHysteria2(uri) {
  try {
    var url = new URL(uri), params = url.searchParams;
    var p = {
      name: decodeURIComponent(url.hash ? url.hash.slice(1) : 'Hysteria2 节点'), type: 'hysteria2',
      server: url.hostname, port: parseInt(url.port) || 443,
      password: url.username || params.get('auth') || '', udp: true,
    };
    if (params.get('sni')) p.sni = params.get('sni');
    if (params.get('insecure') === '1' || params.get('insecure') === 'true') p['skip-cert-verify'] = true;
    if (params.get('mport')) p.ports = params.get('mport');
    if (params.get('obfs')) { p.obfs = { type: params.get('obfs') }; if (params.get('obfs-password')) p.obfs.password = params.get('obfs-password'); }
    if (params.get('alpn')) p.alpn = params.get('alpn').split(',').map(function(s) { return s.trim(); });
    return p;
  } catch (e) { return null; }
}

function parseTuic(uri) {
  try {
    var url = new URL(uri), params = url.searchParams;
    var p = {
      name: decodeURIComponent(url.hash ? url.hash.slice(1) : 'TUIC 节点'), type: 'tuic',
      server: url.hostname, port: parseInt(url.port) || 443,
      uuid: url.username, password: url.password || '', udp: true,
    };
    if (params.get('congestion_control')) p['congestion-controller'] = params.get('congestion_control');
    if (params.get('alpn')) p.alpn = params.get('alpn').split(',').map(function(s) { return s.trim(); });
    if (params.get('sni')) p.sni = params.get('sni');
    if (params.get('allow_insecure') === '1' || params.get('allow_insecure') === 'true') p['skip-cert-verify'] = true;
    if (params.get('disable_sni') === '1' || params.get('disable_sni') === 'true') p['disable-sni'] = true;
    if (params.get('reduce_rtt') === '1' || params.get('reduce_rtt') === 'true') p['reduce-rtt'] = true;
    if (params.get('udp_relay_mode')) p['udp-relay-mode'] = params.get('udp_relay_mode');
    return p;
  } catch (e) { return null; }
}

function parseLink(link) {
  var t = link.trim();
  if (!t) return null;
  if (t.startsWith('vmess://')) return parseVmess(t);
  if (t.startsWith('vless://')) return parseVless(t);
  if (t.startsWith('trojan://')) return parseTrojan(t);
  if (t.startsWith('ss://')) return parseSS(t);
  if (t.startsWith('hysteria2://') || t.startsWith('hy2://')) return parseHysteria2(t);
  if (t.startsWith('tuic://')) return parseTuic(t);
  return null;
}

// ======================== 国家检测 ========================

var countryCache = {};

var COUNTRY_MAP = {
  'Japan': '日本','South Korea': '韩国','Singapore': '新加坡','United States': '美国',
  'Hong Kong': '香港','Taiwan': '台湾','China': '中国','Germany': '德国',
  'Netherlands': '荷兰','United Kingdom': '英国','France': '法国','Canada': '加拿大',
  'Australia': '澳大利亚','Russia': '俄罗斯','India': '印度','Brazil': '巴西',
  'Thailand': '泰国','Vietnam': '越南','Malaysia': '马来西亚','Indonesia': '印度尼西亚',
  'Philippines': '菲律宾','Sweden': '瑞典','Switzerland': '瑞士','Italy': '意大利',
  'Spain': '西班牙','Turkey': '土耳其','United Arab Emirates': '阿联酋','South Africa': '南非',
  'Macau': '澳门','Finland': '芬兰','Poland': '波兰','Luxembourg': '卢森堡',
  'Belgium': '比利时','Austria': '奥地利','Norway': '挪威','Denmark': '丹麦',
  'Ireland': '爱尔兰','Portugal': '葡萄牙','Czech Republic': '捷克','Romania': '罗马尼亚',
  'Argentina': '阿根廷','Chile': '智利','Mexico': '墨西哥','Colombia': '哥伦比亚','New Zealand': '新西兰',
};

var FLAG_TO_COUNTRY = {
  '🇭🇰': '香港','🇺🇸': '美国','🇯🇵': '日本','🇳🇱': '荷兰','🇷🇺': '俄罗斯','🇩🇪': '德国',
  '🇨🇭': '瑞士','🇫🇷': '法国','🇬🇧': '英国','🇸🇪': '瑞典','🇧🇬': '保加利亚','🇦🇹': '奥地利',
  '🇮🇪': '爱尔兰','🇹🇷': '土耳其','🇭🇺': '匈牙利','🇰🇷': '韩国','🇨🇳': '中国','🇨🇦': '加拿大',
  '🇦🇺': '澳大利亚','🇦🇪': '阿联酋','🇮🇳': '印度','🇮🇩': '印尼','🇧🇷': '巴西','🇦🇷': '阿根廷',
  '🇨🇱': '智利','🇸🇬': '新加坡','🇲🇾': '马来西亚','🇹🇭': '泰国','🇻🇳': '越南','🇵🇭': '菲律宾',
  '🇮🇹': '意大利','🇪🇸': '西班牙','🇳🇴': '挪威','🇩🇰': '丹麦','🇫🇮': '芬兰','🇧🇪': '比利时',
  '🇵🇱': '波兰','🇨🇿': '捷克','🇷🇴': '罗马尼亚','🇿🇦': '南非','🇲🇴': '澳门',
};

var KEYWORD_TO_COUNTRY = {
  'hong kong': '香港','usa': '美国','japan': '日本','netherlands': '荷兰','russia': '俄罗斯',
  'germany': '德国','switzerland': '瑞士','france': '法国','united kingdom': '英国',
  'sweden': '瑞典','bulgaria': '保加利亚','austria': '奥地利','ireland': '爱尔兰',
  'turkey': '土耳其','hungary': '匈牙利','korea': '韩国','taiwan': '台湾','canada': '加拿大',
  'australia': '澳大利亚','united arab emirates': '阿联酋','india': '印度','indonesia': '印尼',
  'brazil': '巴西','argentina': '阿根廷','chile': '智利','singapore': '新加坡',
  'malaysia': '马来西亚','thailand': '泰国','vietnam': '越南','philippines': '菲律宾',
  'italy': '意大利','spain': '西班牙','norway': '挪威','denmark': '丹麦','finland': '芬兰',
  'belgium': '比利时','poland': '波兰','seattle': '美国','los angeles': '美国','san jose': '美国',
  'sydney': '澳大利亚','moscow': '俄罗斯','st. petersburg': '俄罗斯','london': '英国',
  'amsterdam': '荷兰','frankfurt': '德国',
};

function extractCountryFromName(name) {
  for (var flag in FLAG_TO_COUNTRY) { if (name.indexOf(flag) !== -1) return FLAG_TO_COUNTRY[flag]; }
  var lower = name.toLowerCase();
  for (var kw in KEYWORD_TO_COUNTRY) { if (lower.indexOf(kw) !== -1) return KEYWORD_TO_COUNTRY[kw]; }
  return null;
}

async function lookupCountry(server) {
  if (countryCache[server]) return countryCache[server];
  try {
    var ipApiUrl = 'http://ip-api.com/json/' + encodeURIComponent(server) + '?fields=country';
    var proxyBase = location.origin + location.pathname.replace(/\/[^/]*$/, '') + '/api/proxy?url=';
    var useProxy = location.protocol !== 'file:';
    var resp;
    if (useProxy) { resp = await fetch(proxyBase + encodeURIComponent(ipApiUrl)); }
    else { resp = await fetch(ipApiUrl); }
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    var cn = COUNTRY_MAP[data.country] || data.country || '未知';
    countryCache[server] = cn;
    return cn;
  } catch (e) { countryCache[server] = '未知'; return '未知'; }
}

async function detectCountries(proxies) {
  var needLookup = [];
  for (var i = 0; i < proxies.length; i++) {
    var cn = extractCountryFromName(proxies[i]._origName || proxies[i].name);
    if (cn) { proxies[i]._country = cn; proxies[i]._checked = true; }
    else { needLookup.push(proxies[i]); }
  }
  if (needLookup.length === 0) return;
  var servers = [], seen = {};
  for (var i = 0; i < needLookup.length; i++) {
    var s = needLookup[i].server;
    if (!seen[s]) { seen[s] = true; servers.push(s); }
  }
  for (var i = 0; i < servers.length; i++) {
    await lookupCountry(servers[i]);
    if (i < servers.length - 1) await new Promise(function(r) { setTimeout(r, 200); });
  }
  for (var i = 0; i < needLookup.length; i++) {
    needLookup[i]._country = countryCache[needLookup[i].server] || '未知';
    needLookup[i]._checked = true;
  }
}

// ======================== 订阅行管理 ========================

function createSubRow(name, url) {
  var row = document.createElement('div');
  row.className = 'sub-row';
  row.innerHTML =
    '<input class="sub-name" type="text" value="' + esc(name) + '" placeholder="订阅名">' +
    '<input class="sub-url" type="text" value="' + esc(url) + '" placeholder="https://...">' +
    '<button class="btn-remove" title="移除">x</button>';
  row.querySelector('.btn-remove').addEventListener('click', function() { row.remove(); saveSubs(); });
  row.querySelectorAll('input').forEach(function(inp) { inp.addEventListener('input', saveSubs); });
  return row;
}

function getAllSubs() {
  var rows = document.querySelectorAll('#subList .sub-row');
  var subs = [];
  rows.forEach(function(row) {
    var name = row.querySelector('.sub-name').value.trim();
    var url = row.querySelector('.sub-url').value.trim();
    if (url) subs.push({ name: name || '订阅' + (subs.length + 1), url: url });
  });
  return subs;
}

function saveSubs() {
  try { localStorage.setItem('cmg_subList', JSON.stringify(getAllSubs())); } catch (_) {}
}

function getNextSubNumber() {
  var rows = document.querySelectorAll('#subList .sub-row');
  var max = 0;
  rows.forEach(function(row) {
    var m = row.querySelector('.sub-name').value.trim().match(/^订阅(\d+)$/);
    if (m) { var n = parseInt(m[1]); if (n > max) max = n; }
  });
  return max + 1;
}

function addSubRow(name, url) {
  document.getElementById('subList').appendChild(createSubRow(name || '订阅' + getNextSubNumber(), url || ''));
  saveSubs();
}

function esc(s) {
  var div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ======================== 从文本提取代理 ========================

function extractProxiesFromText(txt) {
  var result = [];
  try {
    var cfg = jsyaml.load(txt);
    if (cfg && cfg.proxies && Array.isArray(cfg.proxies)) return cfg.proxies;
  } catch (_) {}
  var lines = txt.split('\n').filter(function(l) { return l.trim(); });
  for (var i = 0; i < lines.length; i++) {
    var p = parseLink(lines[i]);
    if (p) result.push(p);
  }
  return result;
}

// ======================== 核心：一键生成 ========================

async function fetchOneSub(url) {
  var rawText;
  var proxyBase = location.origin + location.pathname.replace(/\/[^/]*$/, '') + '/api/proxy?url=';
  var useProxy = location.protocol !== 'file:';

  try {
    if (useProxy) {
      var presp = await fetch(proxyBase + encodeURIComponent(url));
      if (!presp.ok) throw new Error('代理失败 HTTP ' + presp.status);
      rawText = await presp.text();
    } else {
      var dresp = await fetch(url);
      if (!dresp.ok) throw new Error('HTTP ' + dresp.status);
      rawText = await dresp.text();
    }
  } catch (e) {
    if (useProxy) {
      try {
        var fresp = await fetch(url);
        if (fresp.ok) { rawText = await fresp.text(); }
        else { throw e; }
      } catch (_e2) { throw new Error('CORS 限制 + 代理不可用'); }
    } else { throw new Error(e.message + '（CORS 限制，请部署到 Vercel）'); }
  }

  if (!rawText || rawText.trim().length === 0) throw new Error('返回空内容');

  var proxies = extractProxiesFromText(rawText);
  if (proxies.length === 0) {
    try {
      var decoded = atob(rawText.trim());
      if (decoded) proxies = extractProxiesFromText(decoded);
    } catch (_) {}
  }
  return proxies;
}

function showToast(msg, type) {
  document.getElementById('genStatus').innerHTML = '<span class="toast toast-' + type + '">' + msg + '</span>';
  setTimeout(function() { document.getElementById('genStatus').innerHTML = ''; }, 5000);
}

async function doGenerate() {
  var subs = getAllSubs();
  if (subs.length === 0) { showToast('请至少添加一个订阅链接', 'warning'); return; }
  saveSubs();

  var btn = document.getElementById('btnGenerate');
  btn.disabled = true; btn.textContent = '正在抓取订阅...';

  // Step 1: 抓取所有订阅
  var allProxies = [], ok = 0, fail = 0, failNames = [];

  for (var i = 0; i < subs.length; i++) {
    var sub = subs[i];
    var label = subs.length > 1 ? '[' + (i + 1) + '/' + subs.length + '] ' : '';
    btn.textContent = label + sub.name + ' 抓取中...';
    try {
      var proxies = await fetchOneSub(sub.url);
      if (proxies.length === 0) { fail++; failNames.push(sub.name + '(未识别到节点)'); continue; }
      for (var j = 0; j < proxies.length; j++) {
        proxies[j]._source = sub.name;
        proxies[j]._origName = proxies[j].name;
      }
      allProxies = allProxies.concat(proxies);
      ok++;
    } catch (e) { fail++; failNames.push(sub.name + '(' + e.message + ')'); }
  }

  if (allProxies.length === 0) {
    showToast('所有订阅均未能识别到代理节点', 'error');
    btn.disabled = false; btn.textContent = '生成配置和订阅链接'; return;
  }

  // Step 2: 去重
  var seen = {}, unique = [];
  for (var i = 0; i < allProxies.length; i++) {
    var key = allProxies[i].server + ':' + allProxies[i].port;
    if (!seen[key]) { seen[key] = true; unique.push(allProxies[i]); }
  }
  allProxies = unique;

  // Step 3: 检测国家并重命名
  btn.textContent = '检测国家...';
  await detectCountries(allProxies);

  for (var i = 0; i < allProxies.length; i++) {
    var p = allProxies[i];
    p.name = p._source + '-' + (p._country || '未知') + '-' + (p._origName || p.name);
  }

  // Step 4: 生成配置
  btn.textContent = '生成配置...';

  var lType = 'mixed', startPort = 8000, lAddr = '127.0.0.1';

  // 清理内部字段 + 端口注入
  var finalProxies = allProxies.map(function(p, i) {
    var clean = {};
    for (var k in p) {
      if (k !== '_source' && k !== '_checked' && k !== '_origName' && k !== '_country') {
        clean[k] = p[k];
      }
    }
    var parts = clean.name.split('-');
    if (parts.length >= 2) {
      var port = startPort + i;
      clean.name = parts[0] + '-' + parts[1] + '-' + port + '-' + parts.slice(2).join('-');
    }
    return clean;
  });

  // 监听器列表
  var listeners = finalProxies.map(function(p, i) {
    return { name: p.type + '-' + p.name, type: lType, address: lAddr, port: startPort + i, proxy: p.name };
  });

  // Step 5: 生成最终配置（纯生成，不含基础 YAML 合并）
  btn.textContent = '生成配置...';
  var config = {};

  config.proxies = finalProxies;
  config.listeners = listeners;

  var proxyNames = finalProxies.map(function(p) { return p.name; });
  config['proxy-groups'] = [{ name: 'Proxy', type: 'select', proxies: proxyNames }];
  config.rules = ['MATCH,Proxy'];

  // 最小 DNS 配置：不启用 fake-ip，使用系统 DNS，避免域名节点无法解析
  config.dns = { enable: true, ipv6: false };

  // Step 6: 生成 YAML 和订阅链接
  try {
    var yaml = jsyaml.dump(config, { lineWidth: -1, quotingType: '"' });

    // 订阅链接
    var bytes = new TextEncoder().encode(yaml);
    var binary = '';
    for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    var b64 = btoa(binary);
    var basePath = location.origin + location.pathname.replace(/\/[^/]*$/, '') + '/api/sub?data=';
    var apiUrl = basePath + encodeURIComponent(b64);

    document.getElementById('subLinkInput').value = apiUrl;
    document.getElementById('resultArea').style.display = '';

    var msg = '完成！共 ' + finalProxies.length + ' 个节点，端口 ' + startPort + ' ~ ' + (startPort + finalProxies.length - 1);
    if (failNames.length > 0) msg += '（' + failNames.length + ' 个订阅失败: ' + failNames.join(', ') + '）';
    showToast(msg, fail > 0 ? 'warning' : 'success');
  } catch (e) {
    showToast('YAML 序列化失败: ' + e.message, 'error');
  }

  btn.disabled = false; btn.textContent = '生成配置和订阅链接';
}

async function copyLink() {
  var input = document.getElementById('subLinkInput');
  if (!input.value) return;
  try {
    await navigator.clipboard.writeText(input.value);
    showToast('链接已复制到剪贴板', 'success');
  } catch {
    input.select(); document.execCommand('copy');
    showToast('链接已复制到剪贴板', 'success');
  }
}

// ======================== 初始化 ========================
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('btnAddSub').addEventListener('click', function() { addSubRow('', ''); });
  document.getElementById('btnGenerate').addEventListener('click', doGenerate);
  document.getElementById('btnCopyLink').addEventListener('click', copyLink);

  // 恢复已保存的订阅
  try {
    var savedSubs = localStorage.getItem('cmg_subList');
    if (savedSubs) {
      var subs = JSON.parse(savedSubs);
      if (subs && subs.length > 0) { subs.forEach(function(s) { addSubRow(s.name, s.url); }); }
      else { addSubRow('', ''); }
    } else { addSubRow('', ''); }
  } catch (_) { addSubRow('', ''); }

});
</script>
