<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash Meta 多订阅配置生成器</title>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<style>
  :root {
    --bg: #f8fafc;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-secondary: #64748b;
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }

  .header { text-align: center; padding: 36px 0 28px; }
  .header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em; }
  .header p { color: var(--text-secondary); margin-top: 6px; font-size: .925rem; }

  .steps { display: grid; gap: 24px; }
  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
  }
  .step-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
    font-size: 1.05rem; font-weight: 600;
  }
  .step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--primary); color: #fff; font-size: .85rem; font-weight: 700;
    flex-shrink: 0;
  }

  label { display: block; font-size: .875rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
  textarea, select, input[type="number"], input[type="text"] {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
    font-size: .875rem; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg); color: var(--text); transition: border-color .15s;
    resize: vertical;
  }
  textarea:focus, select:focus, input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
  textarea { min-height: 140px; }
  select, input[type="number"] { font-family: inherit; }
  .form-group { margin-bottom: 16px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border: none; border-radius: 8px;
    font-size: .875rem; font-weight: 500; cursor: pointer;
    transition: all .15s; white-space: nowrap;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: var(--bg); }
  .btn-sm { padding: 6px 12px; font-size: .8rem; }
  .btn-xs { padding: 4px 10px; font-size: .75rem; }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

  .toast {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 8px; font-size: .825rem; font-weight: 500;
    animation: fadeIn .25s ease;
  }
  .toast-success { background: #ecfdf5; color: #065f46; }
  .toast-info { background: #eff6ff; color: #1e40af; }
  .toast-warning { background: #fffbeb; color: #92400e; }
  .toast-error { background: #fef2f2; color: #991b1b; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  .mode-section { border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .mode-title { font-weight: 600; font-size: .9rem; color: var(--primary); margin-bottom: 12px; }

  .proxy-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--bg); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 20px; font-size: .8rem; margin: 2px;
  }
  .proxy-badge .type { font-weight: 700; color: var(--primary); text-transform: uppercase; }
  #proxyPreview { max-height: 200px; overflow-y: auto; padding: 4px 0; margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }

  #outputYaml { min-height: 260px; background: #0f172a; color: #e2e8f0; border-color: #334155; font-size: .825rem; line-height: 1.55; }
  #outputYaml:focus { border-color: var(--primary); }

  .sub-row {
    display: flex; gap: 6px; align-items: center; margin-bottom: 8px;
  }
  .sub-row input.sub-name {
    width: 100px; flex-shrink: 0; padding: 8px 10px;
    font-size: .8rem; font-family: inherit;
  }
  .sub-row input.sub-url {
    flex: 1; min-width: 0; padding: 8px 10px;
    font-size: .8rem;
  }
  .sub-row .btn-remove {
    flex-shrink: 0; width: 30px; height: 30px; padding: 0;
    border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--text-secondary);
    font-size: 1rem; cursor: pointer; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .sub-row .btn-remove:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

  #subLinkArea {
    background: #f0fdf4; border: 1px solid #86efac; border-radius: var(--radius);
    padding: 16px; margin-top: 16px;
  }
  #subLinkArea label { color: #166534; }

  @media (max-width: 640px) {
    .form-row-3 { grid-template-columns: 1fr; }
    .header h1 { font-size: 1.4rem; }
    .step { padding: 16px; }
    .sub-row { flex-wrap: wrap; }
    .sub-row input.sub-name { width: 100%; }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Clash Meta 多订阅配置生成器</h1>
    <p>添加多个订阅链接 → 检测国家并重命名 → 一键生成多出口监听器配置</p>
  </div>

  <div class="steps">
    <!-- ========== 第一步：订阅导入 ========== -->
    <div class="step">
      <div class="step-header"><span class="step-num">1</span> 订阅导入</div>

      <div class="form-group">
        <label>订阅链接（可添加多个，数据自动保存到本地）</label>
        <div id="subList"></div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn btn-outline btn-sm" id="btnAddSub">+ 添加订阅</button>
          <button class="btn btn-primary btn-sm" id="btnFetchSub">全部抓取</button>
        </div>
        <span id="subFetchStatus" style="display:inline-block;margin-top:8px;"></span>
      </div>

      <div style="border-top:1px solid var(--border);padding-top:12px;margin-top:8px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <span style="font-size:.8rem;color:var(--text-secondary);" id="proxyCount">未导入节点</span>
          <button class="btn btn-outline btn-xs" id="btnClearProxies">清除全部</button>
        </div>
        <div id="proxyPreview"></div>
        <button class="btn btn-primary btn-sm" id="btnDetectCountry" style="margin-top:8px;width:100%;">检测国家并重命名</button>
      </div>
    </div>

    <!-- ========== 第二步：监听器设置 + 生成 ========== -->
    <div class="step">
      <div class="step-header"><span class="step-num">2</span> 多出口监听器设置</div>
      <div class="mode-section">
        <div class="mode-title">为每个节点生成独立监听端口</div>
        <div class="form-row-3">
          <div class="form-group">
            <label for="listenerType">监听器类型</label>
            <select id="listenerType">
              <option value="mixed">mixed</option>
              <option value="http">http</option>
              <option value="socks">socks</option>
            </select>
          </div>
          <div class="form-group">
            <label for="startPort">起始端口</label>
            <input type="number" id="startPort" value="8000" min="1024" max="65535">
          </div>
          <div class="form-group">
            <label for="listenAddr">监听地址</label>
            <input type="text" id="listenAddr" value="127.0.0.1">
          </div>
        </div>
        <p style="font-size:.8rem;color:var(--text-secondary);margin-top:4px;">每个节点递增分配端口，自动补充 DNS fake-ip 配置。</p>
      </div>

      <button class="btn btn-primary" id="btnGenerate" style="width:100%;">生成配置</button>
      <span id="genStatus" style="display:inline-block;margin-top:8px;"></span>
    </div>

    <!-- ========== 第三步：预览与订阅链接 ========== -->
    <div class="step">
      <div class="step-header"><span class="step-num">3</span> 预览与订阅链接</div>
      <div class="form-group">
        <label for="outputYaml">生成的 YAML 配置</label>
        <textarea id="outputYaml" readonly placeholder="点击「生成配置」后在此预览..."></textarea>
      </div>
      <div class="btn-group">
        <button class="btn btn-outline btn-sm" id="btnCopy">复制到剪贴板</button>
        <button class="btn btn-outline btn-sm" id="btnDownload">保存为 .yaml</button>
        <button class="btn btn-primary" id="btnGenSubLink">生成订阅链接</button>
        <span id="exportStatus"></span>
      </div>

      <div id="subLinkArea" style="display:none;">
        <label for="subLinkInput">订阅链接（将此 URL 填入 Clash 客户端的订阅地址即可直接导入）</label>
        <div style="display:flex;gap:8px;margin-top:6px;">
          <input type="text" id="subLinkInput" readonly style="flex:1;font-family:monospace;font-size:.8rem;padding:8px 12px;border:1px solid #86efac;border-radius:8px;background:#fff;">
          <button class="btn btn-primary btn-sm" id="btnCopySubLink">复制链接</button>
        </div>
        <p style="font-size:.75rem;color:var(--text-secondary);margin-top:6px;">
          生成的链接指向 <code>/api/sub</code> 端点（base64 编码 YAML）。部署到 Vercel 后，将链接填入 Clash 客户端订阅地址即可直接使用。
        </p>
      </div>
    </div>
  </div>
</div>

<script>
// ======================== 全局状态 ========================
let parsedProxies = [];
let generatedYaml = '';

// 英文国名 → 中文
const COUNTRY_MAP = {
  'Japan': '日本', 'South Korea': '韩国', 'Singapore': '新加坡',
  'United States': '美国', 'Hong Kong': '香港', 'Taiwan': '台湾',
  'China': '中国', 'Germany': '德国', 'Netherlands': '荷兰',
  'United Kingdom': '英国', 'France': '法国', 'Canada': '加拿大',
  'Australia': '澳大利亚', 'Russia': '俄罗斯', 'India': '印度',
  'Brazil': '巴西', 'Thailand': '泰国', 'Vietnam': '越南',
  'Malaysia': '马来西亚', 'Indonesia': '印度尼西亚',
  'Philippines': '菲律宾', 'Sweden': '瑞典', 'Switzerland': '瑞士',
  'Italy': '意大利', 'Spain': '西班牙', 'Turkey': '土耳其',
  'United Arab Emirates': '阿联酋', 'South Africa': '南非',
  'Macau': '澳门', 'Finland': '芬兰', 'Poland': '波兰',
  'Luxembourg': '卢森堡', 'Belgium': '比利时', 'Austria': '奥地利',
  'Norway': '挪威', 'Denmark': '丹麦', 'Ireland': '爱尔兰',
  'Portugal': '葡萄牙', 'Czech Republic': '捷克', 'Romania': '罗马尼亚',
  'Argentina': '阿根廷', 'Chile': '智利', 'Mexico': '墨西哥',
  'Colombia': '哥伦比亚', 'New Zealand': '新西兰',
};

// ======================== 协议解析 ========================

function parseVmess(uri) {
  try {
    const b64 = uri.replace('vmess://', '');
    const json = JSON.parse(atob(b64));
    const proxy = {
      name: json.ps || 'VMess 节点', type: 'vmess',
      server: json.add, port: parseInt(json.port) || 443,
      uuid: json.id, alterId: parseInt(json.aid) || 0,
      cipher: json.scy || 'auto', udp: true,
    };
    if (json.net) proxy.network = json.net;
    if (json.net === 'ws') {
      proxy.ws_opts = { path: json.path || '/', headers: {} };
      if (json.host) proxy.ws_opts.headers.Host = json.host;
    } else if (json.net === 'grpc') {
      proxy.grpc_opts = { grpc_service_name: json.path || '' };
    } else if (json.net === 'h2') {
      proxy.h2_opts = { host: [json.host] || [], path: json.path || '' };
    }
    if (json.tls === 'tls') {
      proxy.tls = true;
      if (json.sni) proxy.servername = json.sni;
      if (json.alpn) proxy.alpn = json.alpn.split(',').map(s => s.trim());
      if (json.fp) proxy.client_fingerprint = json.fp;
    }
    return proxy;
  } catch (e) { console.error('VMess 解析失败:', e); return null; }
}

function parseVless(uri) {
  try {
    const url = new URL(uri);
    const proxy = {
      name: decodeURIComponent(url.hash?.slice(1) || 'VLESS 节点'), type: 'vless',
      server: url.hostname, port: parseInt(url.port) || 443,
      uuid: url.username, udp: true,
    };
    const params = url.searchParams;
    proxy.cipher = params.get('encryption') || 'none';
    const type = params.get('type') || 'tcp';
    proxy.network = type;
    if (type === 'ws') {
      proxy.ws_opts = { path: params.get('path') || '/', headers: {} };
      if (params.get('host')) proxy.ws_opts.headers.Host = params.get('host');
    } else if (type === 'grpc') {
      proxy.grpc_opts = { grpc_service_name: params.get('serviceName') || '' };
    }
    const security = params.get('security') || 'none';
    if (security === 'reality') {
      proxy.tls = true;
      proxy.reality_opts = { public_key: params.get('pbk') || '', short_id: params.get('sid') || '' };
      if (params.get('sni')) proxy.servername = params.get('sni');
      if (params.get('fp')) proxy.client_fingerprint = params.get('fp');
      if (params.get('flow')) proxy.flow = params.get('flow');
    } else if (security === 'tls') {
      proxy.tls = true;
      if (params.get('sni')) proxy.servername = params.get('sni');
      if (params.get('fp')) proxy.client_fingerprint = params.get('fp');
      if (params.get('alpn')) proxy.alpn = params.get('alpn').split(',').map(s => s.trim());
      if (params.get('flow')) proxy.flow = params.get('flow');
    }
    return proxy;
  } catch (e) { console.error('VLESS 解析失败:', e); return null; }
}

function parseTrojan(uri) {
  try {
    const url = new URL(uri);
    const proxy = {
      name: decodeURIComponent(url.hash?.slice(1) || 'Trojan 节点'), type: 'trojan',
      server: url.hostname, port: parseInt(url.port) || 443,
      password: url.username, udp: true,
    };
    const params = url.searchParams;
    const type = params.get('type') || 'tcp';
    proxy.network = type;
    if (type === 'ws') {
      proxy.ws_opts = { path: params.get('path') || '/', headers: {} };
      if (params.get('host')) proxy.ws_opts.headers.Host = params.get('host');
    } else if (type === 'grpc') {
      proxy.grpc_opts = { grpc_service_name: params.get('serviceName') || '' };
    }
    if ((params.get('security') || 'tls') === 'tls') {
      proxy.tls = true;
      if (params.get('sni')) proxy.servername = params.get('sni');
      if (params.get('fp')) proxy.client_fingerprint = params.get('fp');
      if (params.get('alpn')) proxy.alpn = params.get('alpn').split(',').map(s => s.trim());
    }
    return proxy;
  } catch (e) { console.error('Trojan 解析失败:', e); return null; }
}

function parseSS(uri) {
  try {
    const withoutHash = uri.split('#')[0];
    const name = uri.includes('#') ? decodeURIComponent(uri.split('#')[1]) : 'SS 节点';
    let rest = withoutHash.replace('ss://', ''), method, password, server, port;
    if (rest.includes('@')) {
      const [b64, addr] = rest.split('@');
      const d = atob(b64), ci = d.indexOf(':');
      method = d.slice(0, ci); password = d.slice(ci + 1);
      const lc = addr.lastIndexOf(':');
      server = addr.slice(0, lc);
      if (server.startsWith('[') && server.endsWith(']')) server = server.slice(1, -1);
      port = parseInt(addr.slice(lc + 1)) || 8388;
    } else {
      const d = atob(rest), [cred, addr] = d.split('@'), ci = cred.indexOf(':');
      method = cred.slice(0, ci); password = cred.slice(ci + 1);
      const lc = addr.lastIndexOf(':');
      server = addr.slice(0, lc);
      if (server.startsWith('[') && server.endsWith(']')) server = server.slice(1, -1);
      port = parseInt(addr.slice(lc + 1)) || 8388;
    }
    return { name, type: 'ss', server, port, cipher: method, password, udp: true };
  } catch (e) { console.error('SS 解析失败:', e); return null; }
}

function parseHysteria2(uri) {
  try {
    const url = new URL(uri);
    const params = url.searchParams;
    const proxy = {
      name: decodeURIComponent(url.hash?.slice(1) || 'Hysteria2 节点'), type: 'hysteria2',
      server: url.hostname, port: parseInt(url.port) || 443,
      password: url.username || params.get('auth') || '', udp: true,
    };
    if (params.get('sni')) proxy.sni = params.get('sni');
    if (params.get('insecure') === '1' || params.get('insecure') === 'true') proxy.skip_cert_verify = true;
    if (params.get('mport')) proxy.ports = params.get('mport');
    if (params.get('obfs')) {
      proxy.obfs = { type: params.get('obfs') };
      if (params.get('obfs-password')) proxy.obfs.password = params.get('obfs-password');
    }
    if (params.get('alpn')) proxy.alpn = params.get('alpn').split(',').map(s => s.trim());
    return proxy;
  } catch (e) { console.error('Hysteria2 解析失败:', e); return null; }
}

function parseTuic(uri) {
  try {
    const url = new URL(uri);
    const params = url.searchParams;
    const proxy = {
      name: decodeURIComponent(url.hash?.slice(1) || 'TUIC 节点'), type: 'tuic',
      server: url.hostname, port: parseInt(url.port) || 443,
      uuid: url.username, password: url.password || '', udp: true,
    };
    if (params.get('congestion_control')) proxy.congestion_controller = params.get('congestion_control');
    if (params.get('alpn')) proxy.alpn = params.get('alpn').split(',').map(s => s.trim());
    if (params.get('sni')) proxy.sni = params.get('sni');
    if (params.get('allow_insecure') === '1' || params.get('allow_insecure') === 'true') proxy.skip_cert_verify = true;
    if (params.get('disable_sni') === '1' || params.get('disable_sni') === 'true') proxy.disable_sni = true;
    if (params.get('reduce_rtt') === '1' || params.get('reduce_rtt') === 'true') proxy.reduce_rtt = true;
    if (params.get('udp_relay_mode')) proxy.udp_relay_mode = params.get('udp_relay_mode');
    return proxy;
  } catch (e) { console.error('TUIC 解析失败:', e); return null; }
}

function parseLink(link) {
  const t = link.trim();
  if (!t) return null;
  if (t.startsWith('vmess://')) return parseVmess(t);
  if (t.startsWith('vless://')) return parseVless(t);
  if (t.startsWith('trojan://')) return parseTrojan(t);
  if (t.startsWith('ss://')) return parseSS(t);
  if (t.startsWith('hysteria2://') || t.startsWith('hy2://')) return parseHysteria2(t);
  if (t.startsWith('tuic://')) return parseTuic(t);
  return null;
}

// ======================== 国家检测 ========================

const countryCache = {};

const FLAG_TO_COUNTRY = {
  '🇭🇰': '香港','🇺🇸': '美国','🇯🇵': '日本','🇳🇱': '荷兰','🇷🇺': '俄罗斯','🇩🇪': '德国',
  '🇨🇭': '瑞士','🇫🇷': '法国','🇬🇧': '英国','🇸🇪': '瑞典','🇧🇬': '保加利亚','🇦🇹': '奥地利',
  '🇮🇪': '爱尔兰','🇹🇷': '土耳其','🇭🇺': '匈牙利','🇰🇷': '韩国','🇨🇳': '中国','🇨🇦': '加拿大',
  '🇦🇺': '澳大利亚','🇦🇪': '阿联酋','🇮🇳': '印度','🇮🇩': '印尼','🇧🇷': '巴西','🇦🇷': '阿根廷',
  '🇨🇱': '智利','🇸🇬': '新加坡','🇲🇾': '马来西亚','🇹🇭': '泰国','🇻🇳': '越南','🇵🇭': '菲律宾',
  '🇮🇹': '意大利','🇪🇸': '西班牙','🇳🇴': '挪威','🇩🇰': '丹麦','🇫🇮': '芬兰','🇧🇪': '比利时',
  '🇵🇱': '波兰','🇨🇿': '捷克','🇷🇴': '罗马尼亚','🇿🇦': '南非','🇲🇴': '澳门',
};

const KEYWORD_TO_COUNTRY = {
  'hong kong': '香港','usa': '美国','japan': '日本','netherlands': '荷兰','russia': '俄罗斯',
  'germany': '德国','switzerland': '瑞士','france': '法国','united kingdom': '英国','sweden': '瑞典',
  'bulgaria': '保加利亚','austria': '奥地利','ireland': '爱尔兰','turkey': '土耳其','hungary': '匈牙利',
  'korea': '韩国','taiwan': '台湾','canada': '加拿大','australia': '澳大利亚',
  'united arab emirates': '阿联酋','india': '印度','indonesia': '印尼','brazil': '巴西',
  'argentina': '阿根廷','chile': '智利','singapore': '新加坡','malaysia': '马来西亚',
  'thailand': '泰国','vietnam': '越南','philippines': '菲律宾','italy': '意大利','spain': '西班牙',
  'norway': '挪威','denmark': '丹麦','finland': '芬兰','belgium': '比利时','poland': '波兰',
  'seattle': '美国','los angeles': '美国','san jose': '美国','sydney': '澳大利亚',
  'moscow': '俄罗斯','st. petersburg': '俄罗斯','london': '英国','amsterdam': '荷兰','frankfurt': '德国',
};

function extractCountryFromName(name) {
  for (const [flag, cn] of Object.entries(FLAG_TO_COUNTRY)) {
    if (name.includes(flag)) return cn;
  }
  const lower = name.toLowerCase();
  for (const [kw, cn] of Object.entries(KEYWORD_TO_COUNTRY)) {
    if (lower.includes(kw)) return cn;
  }
  return null;
}

async function lookupCountry(server) {
  if (countryCache[server]) return countryCache[server];
  try {
    const resp = await fetch('http://ip-api.com/json/' + encodeURIComponent(server) + '?fields=country');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const cn = COUNTRY_MAP[data.country] || data.country || '未知';
    countryCache[server] = cn;
    return cn;
  } catch (e) {
    console.warn('GeoIP 查询失败:', server, e.message);
    countryCache[server] = '未知';
    return '未知';
  }
}

// ======================== 订阅行管理 ========================

function createSubRow(name, url) {
  const row = document.createElement('div');
  row.className = 'sub-row';
  row.innerHTML =
    '<input class="sub-name" type="text" value="' + escapeHtml(name) + '" placeholder="订阅名">' +
    '<input class="sub-url" type="text" value="' + escapeHtml(url) + '" placeholder="https://...">' +
    '<button class="btn-remove" title="移除">x</button>';
  row.querySelector('.btn-remove').addEventListener('click', function() { row.remove(); saveSubs(); });
  row.querySelectorAll('input').forEach(function(inp) { inp.addEventListener('input', saveSubs); });
  return row;
}

function getAllSubs() {
  const rows = document.querySelectorAll('#subList .sub-row');
  const subs = [];
  rows.forEach(function(row) {
    const name = row.querySelector('.sub-name').value.trim();
    const url = row.querySelector('.sub-url').value.trim();
    if (url) subs.push({ name: name || '订阅' + (subs.length + 1), url: url });
  });
  return subs;
}

function saveSubs() {
  try { localStorage.setItem('cmg2_subList', JSON.stringify(getAllSubs())); } catch (_) {}
}

function addSubRow(name, url) {
  document.getElementById('subList').appendChild(createSubRow(name || '', url || ''));
  saveSubs();
}

// ======================== 抓取订阅 ========================

function extractProxiesFromText(txt) {
  let result = [];
  try {
    const cfg = jsyaml.load(txt);
    if (cfg && cfg.proxies && Array.isArray(cfg.proxies)) return cfg.proxies;
  } catch (_) {}
  const lines = txt.split('\n').filter(function(l) { return l.trim(); });
  for (let i = 0; i < lines.length; i++) {
    const p = parseLink(lines[i]);
    if (p) result.push(p);
  }
  return result;
}

async function fetchOneSubscription(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  let rawText = await resp.text();
  if (!rawText || rawText.trim().length === 0) throw new Error('返回空内容');
  let proxies = extractProxiesFromText(rawText);
  if (proxies.length === 0) {
    try {
      const decoded = atob(rawText.trim());
      if (decoded) proxies = extractProxiesFromText(decoded);
    } catch (_) {}
  }
  return proxies;
}

function mergeProxies(newProxies) {
  const seen = new Set(parsedProxies.map(function(p) { return p.server + ':' + p.port; }));
  const unique = newProxies.filter(function(p) {
    const key = p.server + ':' + p.port;
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });
  parsedProxies = parsedProxies.concat(unique);
}

async function fetchAllSubscriptions() {
  const subs = getAllSubs();
  if (subs.length === 0) { showToast('subFetchStatus', '请至少添加一个订阅链接', 'warning'); return; }
  saveSubs();
  const el = document.getElementById('subFetchStatus');
  let allNew = [], ok = 0, fail = 0;

  for (let i = 0; i < subs.length; i++) {
    const sub = subs[i];
    const label = subs.length > 1 ? '[' + (i + 1) + '/' + subs.length + '] ' : '';
    el.innerHTML = '<span class="toast toast-info">' + label + sub.name + ' 正在抓取...</span>';
    try {
      let proxies = await fetchOneSubscription(sub.url);
      if (proxies.length === 0) { fail++; continue; }
      for (const p of proxies) {
        p._source = sub.name; p._origName = p.name; p._checked = false;
      }
      allNew = allNew.concat(proxies); ok++;
    } catch (e) { fail++; console.error('抓取失败:', sub.name, e.message); }
  }

  if (allNew.length === 0) {
    el.innerHTML = '<span class="toast toast-warning">所有订阅均未能识别到代理节点</span>';
    setTimeout(function() { el.innerHTML = ''; }, 5000); return;
  }

  mergeProxies(allNew);
  renderProxyPreview();
  const unchecked = parsedProxies.filter(function(p) { return p._source && !p._checked; }).length;
  let msg = ok + ' 个订阅抓取完成，共 ' + parsedProxies.length + ' 个节点';
  if (unchecked > 0) msg += '，' + unchecked + ' 个待查国家';
  el.innerHTML = '<span class="toast toast-' + (fail > 0 ? 'warning' : 'success') + '">' + msg + '</span>';
  setTimeout(function() { el.innerHTML = ''; }, 5000);
}

// ======================== 国家检测并重命名 ========================

async function detectAndRenameAll() {
  const unchecked = parsedProxies.filter(function(p) { return p._source && !p._checked; });
  if (unchecked.length === 0) { showToast('subFetchStatus', '所有节点已检测过国家', 'info'); return; }

  const btn = document.getElementById('btnDetectCountry');
  btn.disabled = true; btn.textContent = '检测中...';
  const el = document.getElementById('subFetchStatus');
  el.innerHTML = '<span class="toast toast-info">正在检测 ' + unchecked.length + ' 个节点国家...</span>';

  const servers = [...new Set(unchecked.map(function(p) { return p.server; }))];
  for (let i = 0; i < servers.length; i++) {
    el.innerHTML = '<span class="toast toast-info">检测国家 [' + (i + 1) + '/' + servers.length + ']...</span>';
    await lookupCountry(servers[i]);
    if (i < servers.length - 1) await new Promise(function(r) { return setTimeout(r, 200); });
  }

  for (let i = 0; i < unchecked.length; i++) {
    const p = unchecked[i];
    const country = countryCache[p.server] || '未知';
    const baseName = p._origName || p.name;
    p.name = p._source + '-' + country + '-' + baseName;
    p._origName = baseName; p._checked = true;
  }

  renderProxyPreview();
  el.innerHTML = '<span class="toast toast-success">完成！已为 ' + unchecked.length + ' 个节点标注国家</span>';
  setTimeout(function() { el.innerHTML = ''; }, 4000);
  btn.disabled = false; btn.textContent = '检测国家并重命名';
}

// ======================== UI 渲染 ========================

function renderProxyPreview() {
  const container = document.getElementById('proxyPreview');
  const counter = document.getElementById('proxyCount');
  if (parsedProxies.length === 0) { container.innerHTML = ''; counter.textContent = '未导入节点'; return; }
  const unchecked = parsedProxies.filter(function(p) { return p._source && !p._checked; }).length;
  counter.textContent = '共 ' + parsedProxies.length + ' 个节点' + (unchecked > 0 ? '（' + unchecked + ' 个待查国家）' : '');
  const show = parsedProxies.slice(0, 30);
  let html = show.map(function(p) {
    const tag = p._source && !p._checked ? ' ⏳' : '';
    return '<span class="proxy-badge"><span class="type">' + p.type.toUpperCase() + '</span> ' + escapeHtml(p.name) + tag + '</span>';
  }).join('');
  if (parsedProxies.length > 30) html += '<span class="proxy-badge">... 还有 ' + (parsedProxies.length - 30) + ' 个</span>';
  container.innerHTML = html;
}

function showToast(elId, msg, type) {
  const el = document.getElementById(elId);
  el.innerHTML = '<span class="toast toast-' + type + '">' + msg + '</span>';
  setTimeout(function() { el.innerHTML = ''; }, 4000);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ======================== 配置生成 ========================

function generateConfig() {
  if (parsedProxies.length === 0) { showToast('genStatus', '请先抓取订阅并检测国家', 'warning'); return; }

  const lType = document.getElementById('listenerType').value;
  const startPort = parseInt(document.getElementById('startPort').value) || 8000;
  const lAddr = document.getElementById('listenAddr').value || '127.0.0.1';

  // 清理内部字段
  let proxies = parsedProxies.map(function(p) {
    const { _source, _checked, _origName, ...clean } = p;
    return clean;
  });

  // 端口号注入节点名：来源-国家-端口-原名
  proxies = proxies.map(function(p, i) {
    const parts = p.name.split('-');
    if (parts.length >= 2) {
      const port = startPort + i;
      return { ...p, name: parts[0] + '-' + parts[1] + '-' + port + '-' + parts.slice(2).join('-') };
    }
    return p;
  });

  // 构建监听器列表
  const listeners = proxies.map(function(p, i) {
    return { name: p.type + '-' + p.name, type: lType, address: lAddr, port: startPort + i, proxy: p.name };
  });

  const proxyNames = proxies.map(function(p) { return p.name; });

  const config = {
    proxies: proxies,
    listeners: listeners,
    'proxy-groups': [{ name: 'Proxy', type: 'select', proxies: proxyNames }],
    rules: ['MATCH,Proxy'],
    dns: {
      enable: true,
      'enhanced-mode': 'fake-ip',
      'fake-ip-range': '198.18.0.1/16',
      'default-nameserver': ['114.114.114.114', '223.5.5.5'],
      'fake-ip-filter': ['*.lan', 'localhost.ptlogin2.qq.com'],
      nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query'],
      fallback: ['https://cloudflare-dns.com/dns-query', 'https://dns.google/dns-query'],
      'fallback-filter': { geoip: true, geoip_code: 'CN' },
    },
  };

  try {
    generatedYaml = jsyaml.dump(config, { lineWidth: -1, quotingType: '"' });
    document.getElementById('outputYaml').value = generatedYaml;
    showToast('genStatus', '配置生成成功！共 ' + proxies.length + ' 个节点，监听端口 ' + startPort + ' ~ ' + (startPort + proxies.length - 1), 'success');
  } catch (e) {
    showToast('genStatus', 'YAML 序列化失败: ' + e.message, 'error');
  }
}

// ======================== 导出 ========================

async function copyToClipboard() {
  if (!generatedYaml) { showToast('exportStatus', '请先生成配置', 'warning'); return; }
  try {
    await navigator.clipboard.writeText(generatedYaml);
    showToast('exportStatus', '已复制到剪贴板', 'success');
  } catch {
    const ta = document.getElementById('outputYaml'); ta.select(); document.execCommand('copy');
    showToast('exportStatus', '已复制到剪贴板', 'success');
  }
}

function downloadToFile() {
  if (!generatedYaml) { showToast('exportStatus', '请先生成配置', 'warning'); return; }
  const blob = new Blob([generatedYaml], { type: 'application/x-yaml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'clash-meta-config.yaml';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('exportStatus', '文件已下载: clash-meta-config.yaml', 'success');
}

function generateSubLink() {
  if (!generatedYaml) { showToast('exportStatus', '请先生成配置', 'warning'); return; }

  const bytes = new TextEncoder().encode(generatedYaml);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  const b64 = btoa(binary);

  const basePath = location.origin + location.pathname.replace(/\/[^/]*$/, '') + '/api/sub?data=';
  const apiUrl = basePath + encodeURIComponent(b64);

  document.getElementById('subLinkInput').value = apiUrl;
  document.getElementById('subLinkArea').style.display = '';
  showToast('exportStatus', '订阅链接已生成！部署到 Vercel 后即可直接填入 Clash 客户端使用', 'success');
}

async function copySubLink() {
  const input = document.getElementById('subLinkInput');
  if (!input.value) { showToast('exportStatus', '请先生成订阅链接', 'warning'); return; }
  try {
    await navigator.clipboard.writeText(input.value);
    showToast('exportStatus', '订阅链接已复制到剪贴板', 'success');
  } catch {
    input.select(); document.execCommand('copy');
    showToast('exportStatus', '订阅链接已复制到剪贴板', 'success');
  }
}

// ======================== 初始化 ========================
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('btnFetchSub').addEventListener('click', fetchAllSubscriptions);
  document.getElementById('btnAddSub').addEventListener('click', function() { addSubRow('', ''); });
  document.getElementById('btnDetectCountry').addEventListener('click', detectAndRenameAll);
  document.getElementById('btnClearProxies').addEventListener('click', function() {
    parsedProxies = []; generatedYaml = '';
    renderProxyPreview(); document.getElementById('outputYaml').value = '';
    document.getElementById('subLinkArea').style.display = 'none';
    showToast('subFetchStatus', '已清除所有节点', 'info');
  });
  document.getElementById('btnGenerate').addEventListener('click', generateConfig);
  document.getElementById('btnCopy').addEventListener('click', copyToClipboard);
  document.getElementById('btnDownload').addEventListener('click', downloadToFile);
  document.getElementById('btnGenSubLink').addEventListener('click', generateSubLink);
  document.getElementById('btnCopySubLink').addEventListener('click', copySubLink);

  // 恢复已保存的订阅列表
  try {
    const savedSubs = localStorage.getItem('cmg2_subList');
    if (savedSubs) {
      const subs = JSON.parse(savedSubs);
      if (subs && subs.length > 0) { subs.forEach(function(s) { addSubRow(s.name, s.url); }); return; }
    }
  } catch (_) {}
  addSubRow('', '');
});
</script>
