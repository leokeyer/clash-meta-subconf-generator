<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash Meta 高级配置生成器</title>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<style>
  :root {
    --bg: #f8fafc;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-secondary: #64748b;
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }

  /* Header */
  .header { text-align: center; padding: 36px 0 28px; }
  .header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em; color: var(--text); }
  .header p { color: var(--text-secondary); margin-top: 6px; font-size: .925rem; }

  /* Steps layout */
  .steps { display: grid; gap: 24px; }
  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
  }
  .step-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
    font-size: 1.05rem; font-weight: 600;
  }
  .step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--primary); color: #fff; font-size: .85rem; font-weight: 700;
    flex-shrink: 0;
  }

  /* Form elements */
  label { display: block; font-size: .875rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
  textarea, select, input[type="number"] {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
    font-size: .875rem; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg); color: var(--text); transition: border-color .15s;
    resize: vertical;
  }
  textarea:focus, select:focus, input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
  textarea { min-height: 140px; }
  select, input[type="number"] { font-family: inherit; }
  .form-group { margin-bottom: 16px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border: none; border-radius: 8px;
    font-size: .875rem; font-weight: 500; cursor: pointer;
    transition: all .15s; white-space: nowrap;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: var(--bg); }
  .btn-sm { padding: 6px 12px; font-size: .8rem; }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

  /* Status toasts */
  .toast {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 8px; font-size: .825rem; font-weight: 500;
    animation: fadeIn .25s ease;
  }
  .toast-success { background: #ecfdf5; color: #065f46; }
  .toast-info { background: #eff6ff; color: #1e40af; }
  .toast-warning { background: #fffbeb; color: #92400e; }
  .toast-error { background: #fef2f2; color: #991b1b; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  /* Toggle / checkbox */
  .toggle-row { display: flex; align-items: center; gap: 10px; }
  .toggle-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
  .toggle-row label { margin-bottom: 0; cursor: pointer; color: var(--text); font-weight: 500; }
  .mode-section { border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .mode-title { font-weight: 600; font-size: .9rem; color: var(--primary); margin-bottom: 12px; }

  /* Proxy list display */
  .proxy-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--bg); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 20px; font-size: .8rem; margin: 2px;
  }
  .proxy-badge .type { font-weight: 700; color: var(--primary); text-transform: uppercase; }
  #proxyPreview { max-height: 200px; overflow-y: auto; padding: 4px 0; margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }

  /* Output */
  #outputYaml { min-height: 280px; background: #0f172a; color: #e2e8f0; border-color: #334155; font-size: .825rem; line-height: 1.55; }
  #outputYaml:focus { border-color: var(--primary); }

  /* Responsive */
  @media (max-width: 640px) {
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
    .header h1 { font-size: 1.4rem; }
    .step { padding: 16px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Clash Meta 高级配置生成器</h1>
    <p>粘贴 YAML 配置与节点链接，快速生成链式代理与多出口监听器配置</p>
  </div>

  <div class="steps" id="app">
    <!-- ========== 第一步：输入 ========== -->
    <div class="step">
      <div class="step-header"><span class="step-num">1</span> 配置输入</div>

      <div class="form-group">
        <label for="yamlInput">现有 YAML 配置（可选，可直接粘贴完整配置或留空仅导入节点）</label>
        <textarea id="yamlInput" placeholder="proxies:
  - name: 香港 01
    type: vmess
    server: hk1.example.com
    port: 443
    uuid: xxxxx
    alterId: 0
    cipher: auto
    udp: true"></textarea>
      </div>

      <div class="form-group">
        <label for="linkInput">批量粘贴节点链接（每行一个，支持 ss / vmess / vless / trojan / hysteria2 / tuic）</label>
        <textarea id="linkInput" placeholder="ss://Y2hhY2hhMjAtaWV0Zi1wb2x5MTMwNTpsWnB5VkF6SE1qS3ZqS0BzZy5leGFtcGxlLmNvbTo4Mzg4#SS%E6%B5%8B%E8%AF%95
vmess://eyJ2IjoiMiIsInBzIjoiVk1lc3MtV1MiLCJhZGQiOiJ2bS5leGFtcGxlLmNvbSIsInBvcnQiOiI0NDMiLCJpZCI6ImFiY2RlZmdoLTEyMzQtNTY3OC1hYmNkLWVmZ2hpamtsbW5vcCIsImFpZCI6IjAiLCJuZXQiOiJ3cyIsInR5cGUiOiJub25lIiwiaG9zdCI6IiIsInBhdGgiOiIvdm1lc3MifQ==
trojan://abc123@trojan.example.com:443?security=tls&sni=trojan.example.com&type=grpc&serviceName=trojan#Trojan-GRPC
vless://uuid-example@vl.example.com:443?encryption=none&security=reality&sni=yahoo.com&fp=chrome&pbk=public-key&flow=xtls-rprx-vision&type=tcp#VLESS-Reality
hysteria2://letmein@hy2.example.com:8443?sni=bing.com&insecure=1&obfs=salamander&obfs-password=obfs123#Hysteria2
tuic://uuid-tuic:password123@tuic.example.com:8443?sni=www.apple.com&alpn=h3&congestion_control=bbr#TUIC-v5"></textarea>
        <div style="margin-top:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <button class="btn btn-primary btn-sm" onclick="parseAllLinks()">解析链接</button>
          <span id="linkStatus"></span>
        </div>
        <div id="proxyPreview"></div>
      </div>

      <div class="form-group" style="border-top:1px solid var(--border);padding-top:16px;margin-top:8px;">
        <label for="subUrlInput">或通过订阅链接导入（输入 Clash 订阅 URL，自动抓取并解析其中的代理节点）</label>
        <div style="display:flex;gap:8px;">
          <input type="text" id="subUrlInput" placeholder="https://your-subscription-url.com/clash.yaml" style="flex:1;font-family:monospace;font-size:.8rem;">
          <button class="btn btn-primary btn-sm" onclick="fetchSubscription()">抓取订阅</button>
        </div>
        <span id="subFetchStatus" style="display:inline-block;margin-top:6px;"></span>
      </div>
    </div>

    <!-- ========== 第二步：功能设置 ========== -->
    <div class="step">
      <div class="step-header"><span class="step-num">2</span> 功能设置</div>

      <!-- 模式 A：链式代理 -->
      <div class="mode-section">
        <div class="mode-title">模式 A — 链式代理（Dialer Proxy）</div>
        <div class="form-row">
          <div class="form-group">
            <label for="relayProxy">跳板节点 (B) — 中转入口</label>
            <select id="relayProxy"><option value="">-- 选择跳板节点 --</option></select>
          </div>
          <div class="form-group">
            <label for="exitProxy">出口节点 (A) — 最终出口</label>
            <select id="exitProxy"><option value="">-- 选择出口节点 --</option></select>
          </div>
        </div>
        <p style="font-size:.8rem;color:var(--text-secondary);">在出口节点 A 中注入 <code>dialer-proxy: B</code>，流量经跳板 B 转发至出口 A。</p>
      </div>

      <!-- 模式 B：多出口监听器 -->
      <div class="mode-section">
        <div class="mode-title">模式 B — 多出口监听器</div>
        <div class="toggle-row" style="margin-bottom:12px;">
          <input type="checkbox" id="enableListeners" onchange="toggleListenerSettings()">
          <label for="enableListeners">为每个节点生成独立监听端口</label>
        </div>
        <div class="form-row-3" id="listenerSettings" style="display:none;">
          <div class="form-group">
            <label for="listenerType">监听器类型</label>
            <select id="listenerType">
              <option value="mixed">mixed</option>
              <option value="http">http</option>
              <option value="socks">socks</option>
            </select>
          </div>
          <div class="form-group">
            <label for="startPort">起始端口</label>
            <input type="number" id="startPort" value="8000" min="1024" max="65535">
          </div>
          <div class="form-group">
            <label for="listenAddr">监听地址</label>
            <input type="text" id="listenAddr" value="127.0.0.1" placeholder="127.0.0.1">
          </div>
        </div>
        <p style="font-size:.8rem;color:var(--text-secondary);">开启后自动生成完整 DNS（fake-ip 模式）配置，每个节点递增分配端口。</p>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateConfig()">生成配置</button>
        <span id="genStatus"></span>
      </div>
    </div>

    <!-- ========== 第三步：预览导出 ========== -->
    <div class="step">
      <div class="step-header"><span class="step-num">3</span> 预览与导出</div>
      <div class="form-group">
        <label for="outputYaml">生成的 YAML 配置</label>
        <textarea id="outputYaml" readonly placeholder="点击「生成配置」后在此预览..."></textarea>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="copyToClipboard()">复制到剪贴板</button>
        <button class="btn btn-outline" onclick="saveToFile()">保存为 .yaml 文件</button>
        <button class="btn btn-outline" onclick="generateSubLink()" style="border-color:var(--primary);color:var(--primary);">生成订阅链接</button>
        <span id="exportStatus"></span>
      </div>
      <div id="subLinkArea" style="display:none; margin-top:12px;">
        <label for="subLinkInput">订阅链接（可将此 URL 填入 Clash 客户端的订阅地址中）</label>
        <div style="display:flex;gap:8px;">
          <input type="text" id="subLinkInput" readonly style="flex:1;font-family:monospace;font-size:.8rem;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);">
          <button class="btn btn-primary btn-sm" onclick="copySubLink()">复制链接</button>
        </div>
        <p style="font-size:.75rem;color:var(--text-secondary);margin-top:4px;">
          生成的链接指向本站自带的 <code>/api/sub</code> 端点（base64 编码）。部署到 Vercel 后即可直接用于 Clash 客户端订阅。本地打开时链接无效，部署后生效。
        </p>
      </div>
    </div>
  </div>
</div>

<script>
// ======================== 全局状态 ========================
let parsedProxies = [];      // 已解析的代理节点列表
let baseConfig = null;       // 从 YAML 文本解析出的基础配置对象

// ======================== 协议解析 ========================

/**
 * 解析 VMess 链接
 * 格式: vmess://base64(json)
 * JSON 字段: v, ps, add, port, id, aid, net, type, host, path, tls, sni, alpn, fp, servername
 */
function parseVmess(uri) {
  try {
    const b64 = uri.replace('vmess://', '');
    const json = JSON.parse(atob(b64));
    const proxy = {
      name: json.ps || 'VMess 节点',
      type: 'vmess',
      server: json.add,
      port: parseInt(json.port) || 443,
      uuid: json.id,
      alterId: parseInt(json.aid) || 0,
      cipher: json.scy || 'auto',
      udp: true,
    };
    // 传输层
    if (json.net) proxy.network = json.net;
    if (json.net === 'ws') {
      proxy.ws_opts = { path: json.path || '/', headers: {} };
      if (json.host) proxy.ws_opts.headers.Host = json.host;
    } else if (json.net === 'grpc') {
      proxy.grpc_opts = { grpc_service_name: json.path || '' };
    } else if (json.net === 'h2') {
      proxy.h2_opts = { host: [json.host] || [], path: json.path || '' };
    }
    // TLS
    if (json.tls === 'tls') {
      proxy.tls = true;
      if (json.sni) proxy.servername = json.sni;
      if (json.alpn) proxy.alpn = json.alpn.split(',').map(s => s.trim());
      if (json.fp) proxy.client_fingerprint = json.fp;
    }
    return proxy;
  } catch (e) {
    console.error('VMess 解析失败:', e);
    return null;
  }
}

/**
 * 解析 VLESS 链接
 * 格式: vless://uuid@server:port?params#name
 * 重点支持 Reality: security=reality, pbk(公钥), fp(fingerprint), flow, sni
 */
function parseVless(uri) {
  try {
    const url = new URL(uri);
    const proxy = {
      name: decodeURIComponent(url.hash?.slice(1) || 'VLESS 节点'),
      type: 'vless',
      server: url.hostname,
      port: parseInt(url.port) || 443,
      uuid: url.username,
      udp: true,
    };
    const params = url.searchParams;
    // 加密
    proxy.cipher = params.get('encryption') || 'none';
    // 传输类型
    const type = params.get('type') || 'tcp';
    proxy.network = type;
    if (type === 'ws') {
      proxy.ws_opts = { path: params.get('path') || '/', headers: {} };
      if (params.get('host')) proxy.ws_opts.headers.Host = params.get('host');
    } else if (type === 'grpc') {
      proxy.grpc_opts = { grpc_service_name: params.get('serviceName') || '' };
    }
    // 安全层（Reality / TLS）
    const security = params.get('security') || 'none';
    if (security === 'reality') {
      proxy.tls = true;
      proxy.reality_opts = {
        public_key: params.get('pbk') || '',
        short_id: params.get('sid') || '',
      };
      if (params.get('sni')) proxy.servername = params.get('sni');
      if (params.get('fp')) proxy.client_fingerprint = params.get('fp');
      if (params.get('flow')) proxy.flow = params.get('flow');
    } else if (security === 'tls') {
      proxy.tls = true;
      if (params.get('sni')) proxy.servername = params.get('sni');
      if (params.get('fp')) proxy.client_fingerprint = params.get('fp');
      if (params.get('alpn')) proxy.alpn = params.get('alpn').split(',').map(s => s.trim());
      if (params.get('flow')) proxy.flow = params.get('flow');
    }
    return proxy;
  } catch (e) {
    console.error('VLESS 解析失败:', e);
    return null;
  }
}

/**
 * 解析 Trojan 链接
 * 格式: trojan://password@server:port?params#name
 */
function parseTrojan(uri) {
  try {
    const url = new URL(uri);
    const proxy = {
      name: decodeURIComponent(url.hash?.slice(1) || 'Trojan 节点'),
      type: 'trojan',
      server: url.hostname,
      port: parseInt(url.port) || 443,
      password: url.username,
      udp: true,
    };
    const params = url.searchParams;
    const type = params.get('type') || 'tcp';
    proxy.network = type;
    if (type === 'ws') {
      proxy.ws_opts = { path: params.get('path') || '/', headers: {} };
      if (params.get('host')) proxy.ws_opts.headers.Host = params.get('host');
    } else if (type === 'grpc') {
      proxy.grpc_opts = { grpc_service_name: params.get('serviceName') || '' };
    }
    const security = params.get('security') || 'tls';
    if (security === 'tls') {
      proxy.tls = true;
      if (params.get('sni')) proxy.servername = params.get('sni');
      if (params.get('fp')) proxy.client_fingerprint = params.get('fp');
      if (params.get('alpn')) proxy.alpn = params.get('alpn').split(',').map(s => s.trim());
    }
    return proxy;
  } catch (e) {
    console.error('Trojan 解析失败:', e);
    return null;
  }
}

/**
 * 解析 Shadowsocks (SS) 链接
 * 格式: ss://base64(method:password@server:port)#name
 * 或:   ss://base64(method:password)@server:port#name (SIP002)
 */
function parseSS(uri) {
  try {
    const withoutHash = uri.split('#')[0];
    const hashPart = uri.includes('#') ? uri.split('#')[1] : '';
    const name = hashPart ? decodeURIComponent(hashPart) : 'SS 节点';

    let rest = withoutHash.replace('ss://', '');
    let method, password, server, port;

    // SIP002 格式: ss://base64(method:password)@server:port
    if (rest.includes('@')) {
      const [b64Part, addrPart] = rest.split('@');
      const decoded = atob(b64Part);
      const colonIdx = decoded.indexOf(':');
      method = decoded.slice(0, colonIdx);
      password = decoded.slice(colonIdx + 1);
      const lastColon = addrPart.lastIndexOf(':');
      server = addrPart.slice(0, lastColon);
      // 去除 IPv6 方括号
      if (server.startsWith('[') && server.endsWith(']')) server = server.slice(1, -1);
      port = parseInt(addrPart.slice(lastColon + 1)) || 8388;
    } else {
      // 旧格式: ss://base64(method:password@server:port)
      const decoded = atob(rest);
      const [cred, addr] = decoded.split('@');
      const cIdx = cred.indexOf(':');
      method = cred.slice(0, cIdx);
      password = cred.slice(cIdx + 1);
      const lastColon = addr.lastIndexOf(':');
      server = addr.slice(0, lastColon);
      if (server.startsWith('[') && server.endsWith(']')) server = server.slice(1, -1);
      port = parseInt(addr.slice(lastColon + 1)) || 8388;
    }

    return {
      name,
      type: 'ss',
      server,
      port,
      cipher: method,
      password,
      udp: true,
    };
  } catch (e) {
    console.error('SS 解析失败:', e);
    return null;
  }
}

/**
 * 解析 Hysteria2 链接
 * 格式: hysteria2://password@server:port?params#name
 * 或:   hysteria2://server:port?auth=password&params#name
 */
function parseHysteria2(uri) {
  try {
    const url = new URL(uri);
    const name = decodeURIComponent(url.hash?.slice(1) || 'Hysteria2 节点');
    const params = url.searchParams;

    // 密码来源：优先 username，其次 auth 参数
    const password = url.username || params.get('auth') || '';

    const proxy = {
      name,
      type: 'hysteria2',
      server: url.hostname,
      port: parseInt(url.port) || 443,
      password,
      udp: true,
    };

    if (params.get('sni')) proxy.sni = params.get('sni');
    // insecure 跳过证书验证
    if (params.get('insecure') === '1' || params.get('insecure') === 'true') {
      proxy.skip_cert_verify = true;
    }
    // 端口跳跃
    if (params.get('mport')) proxy.ports = params.get('mport');
    // 混淆
    if (params.get('obfs')) {
      proxy.obfs = { type: params.get('obfs') };
      if (params.get('obfs-password')) proxy.obfs.password = params.get('obfs-password');
    }
    // ALPN
    if (params.get('alpn')) proxy.alpn = params.get('alpn').split(',').map(s => s.trim());

    return proxy;
  } catch (e) {
    console.error('Hysteria2 解析失败:', e);
    return null;
  }
}

/**
 * 解析 TUIC v5 链接
 * 格式: tuic://uuid:password@server:port?params#name
 */
function parseTuic(uri) {
  try {
    const url = new URL(uri);
    const name = decodeURIComponent(url.hash?.slice(1) || 'TUIC 节点');
    const params = url.searchParams;

    const proxy = {
      name,
      type: 'tuic',
      server: url.hostname,
      port: parseInt(url.port) || 443,
      uuid: url.username,
      password: url.password || '',
      udp: true,
    };

    // TUIC v5 参数
    if (params.get('congestion_control')) proxy.congestion_controller = params.get('congestion_control');
    if (params.get('alpn')) proxy.alpn = params.get('alpn').split(',').map(s => s.trim());
    if (params.get('sni')) proxy.sni = params.get('sni');
    // 跳过证书验证
    if (params.get('allow_insecure') === '1' || params.get('allow_insecure') === 'true') {
      proxy.skip_cert_verify = true;
    }
    // 禁用 SNI
    if (params.get('disable_sni') === '1' || params.get('disable_sni') === 'true') {
      proxy.disable_sni = true;
    }
    // 零 RTT 握手
    if (params.get('reduce_rtt') === '1' || params.get('reduce_rtt') === 'true') {
      proxy.reduce_rtt = true;
    }
    // UDP 中继模式
    if (params.get('udp_relay_mode')) proxy.udp_relay_mode = params.get('udp_relay_mode');

    return proxy;
  } catch (e) {
    console.error('TUIC 解析失败:', e);
    return null;
  }
}

/**
 * 路由分发：根据前缀匹配协议类型并调用对应解析器
 */
function parseLink(link) {
  const trimmed = link.trim();
  if (!trimmed) return null;
  if (trimmed.startsWith('vmess://')) return parseVmess(trimmed);
  if (trimmed.startsWith('vless://')) return parseVless(trimmed);
  if (trimmed.startsWith('trojan://')) return parseTrojan(trimmed);
  if (trimmed.startsWith('ss://')) return parseSS(trimmed);
  if (trimmed.startsWith('hysteria2://') || trimmed.startsWith('hy2://')) return parseHysteria2(trimmed);
  if (trimmed.startsWith('tuic://')) return parseTuic(trimmed);
  return null;
}

// ======================== UI 逻辑 ========================

/** 解析所有链接并更新全局 parsedProxies */
function parseAllLinks() {
  const input = document.getElementById('linkInput').value;
  const lines = input.split('\n').filter(line => line.trim());
  const newProxies = [];

  for (const line of lines) {
    const proxy = parseLink(line);
    if (proxy) newProxies.push(proxy);
  }

  if (newProxies.length > 0) {
    // 合并到全局列表（去重：按 name 去重）
    const existingNames = new Set(parsedProxies.map(p => p.name));
    const uniqueNew = newProxies.filter(p => {
      if (existingNames.has(p.name)) return false;
      existingNames.add(p.name);
      return true;
    });
    parsedProxies = [...parsedProxies, ...uniqueNew];
    showToast('linkStatus', `解析成功，新增 ${uniqueNew.length} 个节点（总计 ${parsedProxies.length} 个）`, 'success');
  } else {
    // 没有新的有效链接
    if (parsedProxies.length === 0) {
      showToast('linkStatus', '未识别到有效节点链接，请检查格式', 'warning');
    } else {
      showToast('linkStatus', '未识别到新的有效节点链接', 'warning');
    }
  }

  renderProxyPreview();
  updateProxySelects();
  // 如果基础配置不为空，自动展示已合并的节点数
  if (baseConfig) {
    baseConfig.proxies = parsedProxies;
  }
}

/**
 * 从订阅链接抓取代理节点
 *
 * 订阅链接返回的常见格式：
 * 1. 纯 YAML / Clash 配置（直接包含 proxies 列表）
 * 2. Base64 编码的 YAML 配置（需先解码）
 * 3. 纯文本代理链接列表（每行一个协议链接）
 */
async function fetchSubscription() {
  var url = document.getElementById('subUrlInput').value.trim();
  if (!url) {
    showToast('subFetchStatus', '请输入订阅链接 URL', 'warning');
    return;
  }

  var el = document.getElementById('subFetchStatus');
  el.innerHTML = '<span class="toast toast-info">正在抓取订阅...</span>';

  var rawText;

  // 策略：先通过自有代理中转（绕过 CORS），代理不可用时（如本地打开）直连尝试
  var fetchUrl = url;
  var proxyBase = location.origin + location.pathname.replace(/\/[^/]*$/, '') + '/api/proxy?url=';
  var useProxy = location.protocol !== 'file:';

  try {
    if (useProxy) {
      var proxyResp = await fetch(proxyBase + encodeURIComponent(url));
      if (!proxyResp.ok) {
        throw new Error('代理抓取失败 HTTP ' + proxyResp.status);
      }
      rawText = await proxyResp.text();
    } else {
      // 本地文件模式：直连（大概率被 CORS 拦截）
      var directResp = await fetch(url);
      if (!directResp.ok) throw new Error('HTTP ' + directResp.status);
      rawText = await directResp.text();
    }
  } catch (e) {
    // 代理失败时尝试直连作为回退
    if (useProxy) {
      try {
        var fallbackResp = await fetch(url);
        if (fallbackResp.ok) {
          rawText = await fallbackResp.text();
        } else {
          throw e;
        }
      } catch (_e2) {
        el.innerHTML = '<span class="toast toast-error">抓取失败: 订阅链接无法访问（CORS 限制 + 代理不可用，请部署到 Vercel 后使用此功能）</span>';
        setTimeout(function() { el.innerHTML = ''; }, 6000);
        return;
      }
    } else {
      el.innerHTML = '<span class="toast toast-error">抓取失败: ' + e.message + '（本地文件模式受 CORS 限制，请部署到 Vercel）</span>';
      setTimeout(function() { el.innerHTML = ''; }, 6000);
      return;
    }
  }

  if (!rawText || rawText.trim().length === 0) {
    el.innerHTML = '<span class="toast toast-warning">订阅链接返回空内容</span>';
    setTimeout(function() { el.innerHTML = ''; }, 4000);
    return;
  }

  var newProxies = [];

  // 通用函数：从文本中提取 proxies
  function extractProxiesFromText(txt) {
    var result = [];
    // 方式 A: YAML 格式（包含 proxies: 键）
    try {
      var cfg = jsyaml.load(txt);
      if (cfg && cfg.proxies && Array.isArray(cfg.proxies)) {
        return cfg.proxies;
      }
    } catch (_) {}

    // 方式 B: 逐行解析代理链接（ss://, vmess://, trojan:// 等）
    var lines = txt.split('\n').filter(function(l) { return l.trim(); });
    for (var i = 0; i < lines.length; i++) {
      var p = parseLink(lines[i]);
      if (p) result.push(p);
    }
    return result;
  }

  // 尝试 1: 原始文本直接解析（YAML 或代理链接列表）
  newProxies = extractProxiesFromText(rawText);

  // 尝试 2: base64 解码后再解析（订阅链接常见格式）
  if (newProxies.length === 0) {
    try {
      var decoded = atob(rawText.trim());
      if (decoded) {
        newProxies = extractProxiesFromText(decoded);
      }
    } catch (_) {}
  }

  if (newProxies.length === 0) {
    el.innerHTML = '<span class="toast toast-warning">未能从订阅链接中识别到代理节点（YAML 中没有 proxies，也不是代理链接列表）</span>';
    setTimeout(function() { el.innerHTML = ''; }, 6000);
    return;
  }

  // 合并去重
  var existingNames = new Set(parsedProxies.map(function(p) { return p.name; }));
  var uniqueNew = newProxies.filter(function(p) {
    if (!p.name) return false;
    if (existingNames.has(p.name)) return false;
    existingNames.add(p.name);
    return true;
  });

  parsedProxies = parsedProxies.concat(uniqueNew);
  renderProxyPreview();
  updateProxySelects();

  el.innerHTML = '<span class="toast toast-success">订阅抓取成功！新增 ' + uniqueNew.length + ' 个节点（总计 ' + parsedProxies.length + ' 个）</span>';
  setTimeout(function() { el.innerHTML = ''; }, 5000);
}

/** 渲染节点预览标签 */
function renderProxyPreview() {
  const container = document.getElementById('proxyPreview');
  if (parsedProxies.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = parsedProxies.map(p =>
    `<span class="proxy-badge"><span class="type">${p.type.toUpperCase()}</span> ${escapeHtml(p.name)}</span>`
  ).join('');
}

/** 更新下拉选择框 */
function updateProxySelects() {
  const names = parsedProxies.map(p => p.name);
  [document.getElementById('relayProxy'), document.getElementById('exitProxy')].forEach(sel => {
    const current = sel.value;
    sel.innerHTML = '<option value="">-- 选择节点 --</option>' +
      names.map(n => `<option value="${escapeHtml(n)}" ${n === current ? 'selected' : ''}>${escapeHtml(n)}</option>`).join('');
  });
}

/** 切换监听器设置可见性 */
function toggleListenerSettings() {
  const checked = document.getElementById('enableListeners').checked;
  document.getElementById('listenerSettings').style.display = checked ? '' : 'none';
}

/** Toast 提示 */
function showToast(elId, msg, type) {
  const el = document.getElementById(elId);
  el.innerHTML = `<span class="toast toast-${type}">${msg}</span>`;
  setTimeout(() => { el.innerHTML = ''; }, 4000);
}

// ======================== 配置生成 ========================

/**
 * 主生成逻辑：
 * 1. 解析基础 YAML（如果有）
 * 2. 合并解析的代理节点
 * 3. 应用模式 A（链式代理）
 * 4. 应用模式 B（多出口监听器）
 * 5. 输出 YAML
 */
function generateConfig() {
  // Step 1: 解析基础 YAML
  const yamlText = document.getElementById('yamlInput').value.trim();
  let config = {};

  if (yamlText) {
    try {
      config = jsyaml.load(yamlText) || {};
      if (typeof config !== 'object' || Array.isArray(config)) {
        showToast('genStatus', 'YAML 格式错误：顶层必须是映射', 'error');
        return;
      }
    } catch (e) {
      showToast('genStatus', `YAML 解析失败: ${e.message}`, 'error');
      return;
    }
  }

  // Step 2: 合并代理节点
  if (parsedProxies.length === 0) {
    showToast('genStatus', '请先解析节点链接', 'warning');
    return;
  }
  config.proxies = parsedProxies;

  // Step 3: 模式 A — 链式代理（dialer-proxy）
  const relayName = document.getElementById('relayProxy').value;
  const exitName = document.getElementById('exitProxy').value;

  if (relayName && exitName) {
    if (relayName === exitName) {
      showToast('genStatus', '跳板节点和出口节点不能相同', 'error');
      return;
    }
    // 为出口节点 A 添加 dialer-proxy 指向跳板 B
    config.proxies = config.proxies.map(p => {
      if (p.name === exitName) {
        return { ...p, 'dialer-proxy': relayName };
      }
      return p;
    });
    showToast('genStatus', `链式代理已设置: ${exitName} → ${relayName}`, 'success');
  }

  // Step 4: 模式 B — 多出口监听器
  const enableListeners = document.getElementById('enableListeners').checked;

  if (enableListeners) {
    const lType = document.getElementById('listenerType').value;
    const startPort = parseInt(document.getElementById('startPort').value) || 8000;
    const lAddr = document.getElementById('listenAddr').value || '127.0.0.1';

    // 为每个节点生成一个监听器
    config.listeners = config.proxies.map((p, i) => ({
      name: `${p.type}-${p.name}`,
      type: lType,
      listen: `${lAddr}:${startPort + i}`,
      proxy: p.name,
    }));

    // 完整的 DNS fake-ip 配置
    config.dns = {
      enable: true,
      listen: '0.0.0.0:53',
      'enhanced-mode': 'fake-ip',
      'fake-ip-range': '198.18.0.1/16',
      'fake-ip-filter': [
        '*.lan',
        'localhost.ptlogin2.qq.com',
      ],
      nameserver: [
        'https://doh.pub/dns-query',
        'https://dns.alidns.com/dns-query',
      ],
      fallback: [
        'https://cloudflare-dns.com/dns-query',
        'https://dns.google/dns-query',
      ],
      'fallback-filter': {
        geoip: true,
        geoip_code: 'CN',
      },
    };
  }

  // Step 5: 输出 YAML
  try {
    const output = jsyaml.dump(config, { lineWidth: -1, noCompatMode: true, quotingType: '"' });
    document.getElementById('outputYaml').value = output;
    showToast('genStatus', `配置生成成功！${enableListeners ? '已包含 DNS fake-ip 配置和 ' + config.proxies.length + ' 个监听器' : ''}`, 'success');
  } catch (e) {
    showToast('genStatus', `YAML 序列化失败: ${e.message}`, 'error');
  }
}

/** 复制到剪贴板 */
async function copyToClipboard() {
  const text = document.getElementById('outputYaml').value;
  if (!text) {
    showToast('exportStatus', '没有可复制的内容，请先生成配置', 'warning');
    return;
  }
  try {
    await navigator.clipboard.writeText(text);
    showToast('exportStatus', '配置已复制到剪贴板', 'success');
  } catch {
    // 降级方案
    const ta = document.getElementById('outputYaml');
    ta.select();
    document.execCommand('copy');
    showToast('exportStatus', '配置已复制到剪贴板', 'success');
  }
}

/** 保存为 .yaml 文件 */
function saveToFile() {
  const text = document.getElementById('outputYaml').value;
  if (!text) {
    showToast('exportStatus', '没有可保存的内容，请先生成配置', 'warning');
    return;
  }
  const blob = new Blob([text], { type: 'application/x-yaml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'clash-meta-config.yaml';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('exportStatus', '文件已下载: clash-meta-config.yaml', 'success');
}

/**
 * 生成订阅链接（自建 API 模式，需部署到 Vercel 后使用）
 *
 * 流程: YAML → base64 编码 → /api/sub?data=<base64> 端点
 * api/sub.js 解码后返回纯文本 YAML（Content-Type: text/plain），Clash 客户端可直接订阅。
 *
 * 在本地 file:// 协议下 api/sub 不可用，部署到 Vercel 后生效。
 */
function generateSubLink() {
  var text = document.getElementById('outputYaml').value;
  if (!text) {
    showToast('exportStatus', '没有可生成的内容，请先生成配置', 'warning');
    return;
  }

  // UTF-8 → base64（标准 btoa 仅支持 ASCII，需先转字节）
  var bytes = new TextEncoder().encode(text);
  var binary = '';
  for (var i = 0; i < bytes.length; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  var b64 = btoa(binary);

  // 拼接 API 路径（兼容 / 和 /index.html 两种部署 URL）
  var basePath = location.origin + location.pathname.replace(/\/[^/]*$/, '') + '/api/sub?data=';
  var apiUrl = basePath + encodeURIComponent(b64);

  document.getElementById('subLinkInput').value = apiUrl;
  document.getElementById('subLinkArea').style.display = '';

  showToast('exportStatus',
    '订阅链接已生成（配置 ' + bytes.length + ' 字节 → base64 ' + b64.length + ' 字符）。部署到 Vercel 后即可用于 Clash 订阅',
    'success');
}

/** 复制订阅链接到剪贴板 */
async function copySubLink() {
  const input = document.getElementById('subLinkInput');
  if (!input.value) {
    showToast('exportStatus', '没有可复制的链接，请先生成订阅链接', 'warning');
    return;
  }
  try {
    await navigator.clipboard.writeText(input.value);
    showToast('exportStatus', '订阅链接已复制到剪贴板', 'success');
  } catch {
    input.select();
    document.execCommand('copy');
    showToast('exportStatus', '订阅链接已复制到剪贴板', 'success');
  }
}

// ======================== 辅助函数 ========================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ======================== 初始化 ========================
// 如果 YAML 框有内容，尝试自动解析基础配置并提取代理列表
document.getElementById('yamlInput').addEventListener('change', () => {
  const yamlText = document.getElementById('yamlInput').value.trim();
  if (!yamlText) { baseConfig = null; return; }
  try {
    baseConfig = jsyaml.load(yamlText) || {};
    if (baseConfig.proxies && Array.isArray(baseConfig.proxies)) {
      // 从 YAML 中提取已有代理并入全局列表
      const existingNames = new Set(parsedProxies.map(p => p.name));
      const fromYaml = baseConfig.proxies.filter(p => {
        if (!p.name) return false;
        if (existingNames.has(p.name)) return false;
        existingNames.add(p.name);
        return true;
      });
      if (fromYaml.length > 0) {
        parsedProxies = [...parsedProxies, ...fromYaml];
        renderProxyPreview();
        updateProxySelects();
        showToast('linkStatus', `从 YAML 中读取到 ${fromYaml.length} 个节点（总计 ${parsedProxies.length} 个）`, 'info');
      }
    }
  } catch {
    baseConfig = null;
  }
});
